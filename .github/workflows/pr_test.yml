name: Test PDF

on:
  pull_request:
    branches: [dev]
    types: [opened, synchronize, edited, reopened]

jobs:
  docker_changes:
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
      full_image_dev: ${{ steps.get_image.outputs.full_image_dev }}
      full_image_pdf: ${{ steps.get_image.outputs.full_image_pdf }}

    steps:
      - uses: actions/checkout@v6

      - name: Check for changes since the last push in WATCH_LIST
        id: filter
        run: |
          if git diff --quiet ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} -- $WATCH_LIST; then
            echo "docker=false" >> $GITHUB_OUTPUT
            echo "No changes detected in: $WATCH_LIST"
          else
            echo "docker=true" >> $GITHUB_OUTPUT
            echo "Changes detected in: $WATCH_LIST"
          fi
      
      - name: Determine Docker Tag
        id: get_image
        run: |
          OWNER=${{ github.repository_owner }}
          IMAGE_PDF=$(cat IMAGE_PDF)
          IMAGE_DEV=$(cat IMAGE_DEV)

          IMAGE_PDF_PATH="ghcr.io/${OWNER,,}/${IMAGE_PDF}"
          IMAGE_DEV_PATH="ghcr.io/${OWNER,,}/${IMAGE_DEV}"
          PR_TAG="pr-${{ github.event.pull_request.number }}"

          if [ "${{ steps.filter.outputs.docker }}" == "true" ] || docker manifest inspect ${IMAGE_PDF_PATH}:${PR_TAG} > /dev/null 2>&1; then
            echo "full_image_pdf=${IMAGE_PDF_PATH}:${PR_TAG}" >> $GITHUB_OUTPUT
            echo "full_image_dev=${IMAGE_DEV_PATH}:${PR_TAG}" >> $GITHUB_OUTPUT
          else
            echo "full_image_pdf=${IMAGE_PDF_PATH}:dev" >> $GITHUB_OUTPUT
            echo "full_image_dev=${IMAGE_DEV_PATH}:dev" >> $GITHUB_OUTPUT
          fi

  build_docker:
    needs: docker_changes
    if: needs.docker_changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker Development image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.dev
          push: true
          tags: ${{ needs.docker_changes.outputs.full_image_dev }}

      - name: Build and push Docker PDF image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.report
          push: true
          tags: ${{ needs.docker_changes.outputs.full_image_pdf }}
  
  generate_data:
    needs: [docker_changes, build_docker]
    if: always() && (needs.build_docker.result == 'success' || needs.build_docker.result == 'skipped')
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.docker_changes.outputs.full_image_dev }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6
      
      - name: Generate report artifacts
        run: |
          make clean
          make generate
      
      - name: Parse excluding paths for upload
        id: parse_paths
        run: |
          GIT_DIR=$(yq '.output_dir + "/" + .git_dir' config.yaml)
          SVN_DIR=$(yq '.output_dir + "/" + .svn_dir' config.yaml)
          {
            echo "excludes<<EOF"
            echo "."
            echo "!$GIT_DIR/**"
            echo "!$SVN_DIR/**"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Upload intermediate data
        uses: actions/upload-artifact@v4
        with:
          name: generated-report-data
          path: ${{ steps.parse_paths.outputs.excludes }}

  build_pdf:
    needs: [docker_changes, generate_data]
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.docker_changes.outputs.full_image_pdf }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6
      
      - name: Download generated data
        uses: actions/download-artifact@v8.0.1
        with:
          name: generated-report-data

      - name: Compile PDF
        run: |
          make pdf