name: Build and Publish PDF

on:
  push:
    branches: [main]

jobs:
  docker_changes:
    runs-on: ubuntu-latest
    env:
      WATCH_LIST: "docker/ IMAGE_PDF IMAGE_DEV"
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
      full_image_dev: ${{ steps.get_image.outputs.full_image_dev }}
      full_image_pdf: ${{ steps.get_image.outputs.full_image_pdf }}

    steps:
      - uses: actions/checkout@v6

      - name: Check for changes since the last push in WATCH_LIST
        id: filter
        run: |
          if git diff --quiet ${{ github.event.before }} ${{ github.event.after }} -- $WATCH_LIST; then
            echo "docker=false" >> $GITHUB_OUTPUT
            echo "No changes detected in: $WATCH_LIST"
          else
            echo "docker=true" >> $GITHUB_OUTPUT
            echo "Changes detected in: $WATCH_LIST"
          fi

      - name: Set full image names
        id: get_image
        run: |
          IMAGE_PDF=$(cat IMAGE_PDF)
          IMAGE_DEV=$(cat IMAGE_DEV)
          echo "full_image_pdf=ghcr.io/${OWNER,,}/${IMAGE_PDF}:latest" >> $GITHUB_OUTPUT
          echo "full_image_dev=ghcr.io/${OWNER,,}/${IMAGE_DEV}:latest" >> $GITHUB_OUTPUT
        env:
          OWNER: '${{ github.repository_owner }}'

  build_docker:
    needs: docker_changes
    if: needs.docker_changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker Development image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.dev
          push: true
          tags: ${{ needs.docker_changes.outputs.full_image_dev }}

      - name: Build and push Docker PDF image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.report
          push: true
          tags: ${{ needs.docker_changes.outputs.full_image_pdf }}
  
  generate_data:
    needs: [docker_changes, build_docker]
    if: always() && (needs.build_docker.result == 'success' || needs.build_docker.result == 'skipped')
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.docker_changes.outputs.full_image_dev }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6
      
      - name: Generate report artifacts
        run: |
          make clean
          make generate
      
      - name: Parse excluding paths for upload
        id: parse_paths
        run: |
          GIT_DIR=$(yq '.output_dir + "/" + .git_dir' config.yaml)
          SVN_DIR=$(yq '.output_dir + "/" + .svn_dir' config.yaml)
          {
            echo "excludes<<EOF"
            echo "."
            echo "!$GIT_DIR/**"
            echo "!$SVN_DIR/**"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Upload intermediate data
        uses: actions/upload-artifact@v4
        with:
          name: generated-report-data
          path: ${{ steps.parse_paths.outputs.excludes }}

  build_pdf:
    needs: [docker_changes, generate_data]
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.docker_changes.outputs.full_image_pdf }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6
      
      - name: Download generated data
        uses: actions/download-artifact@v8.0.1
        with:
          name: generated-report-data

      - name: Compile PDF
        run: |
          make pdf

      - name: Prepare Pages Upload
        run: |
          mkdir -p public
          cp report/main.pdf public/report.pdf
          cat <<EOF > public/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>PDF Report</title>
            <style>
              body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; }
              iframe { width: 100%; height: 100%; border: none; display: block; }
            </style>
          </head>
          <body>
            <iframe src="report.pdf#view=FitH" type="application/pdf">
              <p>Your browser does not support iframes. <a href="report.pdf">Click here to view the PDF.</a></p>
            </iframe>
          </body>
          </html>
          EOF

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy:
    needs: build_pdf
    if: always() && needs.build_pdf.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4